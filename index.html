<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>StudyLens</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="app">

    <!-- Tela 1 - Login -->
    <section class="screen login">
      <h1>StudyLens</h1>
      <p>Seu conteúdo. Mais claro.</p>

      <button class="btn primary">Entrar</button>
      <button class="btn outline">Criar conta</button>
    </section>

    <!-- Tela 2 - Scanner -->
    <section class="screen scanner">
      <div class="camera-box">
        <p>📷 Escaneie seu conteúdo</p>
      </div>
      <button class="capture"></button>
    </section>

    <!-- Tela 3 - Home -->
    <section class="screen home">
      <h2>Olá, Ana 👋</h2>

      <div class="card destaque">
        <p>Capture e entenda qualquer conteúdo</p>
        <button>Capturar agora</button>
      </div>

      <div class="grid">
        <div class="card">Resumo</div>
        <div class="card">Questões</div>
        <div class="card">Flashcards</div>
        <div class="card">Mapa mental</div>
      </div>
    </section>

    <!-- Tela 4 - Resultado -->
    <section class="screen result">
      <h2>Resumo gerado</h2>
      <p>Texto do resumo aparece aqui...</p>
    </section>

    <!-- Tela 5 - Histórico -->
    <section class="screen history">
      <h2>Histórico</h2>
      <ul>
        <li>Fotossíntese</li>
        <li>Revolução Francesa</li>
      </ul>
    </section>

  </div>

</body>
</html>
